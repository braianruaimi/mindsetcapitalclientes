<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Enviada - Mind Set Capital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d4af37;
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-color), #1e293b, #000000);
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1rem;
        }

        .success-card {
            width: 100%;
            max-width: 640px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.45);
        }

        h1 {
            margin-top: 0;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        a {
            display: inline-block;
            text-decoration: none;
            background: var(--primary-color);
            color: #000000;
            font-weight: 700;
            border-radius: 8px;
            padding: 0.8rem 1.2rem;
        }
    </style>
</head>
<body>
    <main class="success-card">
        <h1>Solicitud Enviada</h1>
        <p>Tu formulario fue recibido correctamente. En breve, un asesor de Mind Set Capital revisará la información y se pondrá en contacto contigo.</p>
        <a href="index.html">Volver al formulario</a>
    </main>
</body>
</html>
